<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐦 小鸟跑酷 3D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
#canvas-container { position: relative; width: 100vw; height: 100vh; }
canvas { display: block; }

/* HUD */
#hud {
  position: absolute; top: 0; left: 0; width: 100%; pointer-events: none;
  padding: 10px 16px;
}
#hud-top {
  display: flex; align-items: center; gap: 12px;
  background: rgba(0,0,0,0.45); border-radius: 12px;
  padding: 8px 14px; backdrop-filter: blur(4px);
}
#progress-bar-wrap {
  flex: 1; height: 14px; background: rgba(255,255,255,0.2);
  border-radius: 7px; overflow: hidden;
}
#progress-bar {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #4ade80, #22d3ee);
  border-radius: 7px; transition: width 0.1s;
}
.hud-stat { color: #fff; font-size: 13px; white-space: nowrap; font-weight: 600; }
#hud-dist { color: #4ade80; }
#hud-time { color: #fbbf24; }
#hud-speed { color: #60a5fa; }

/* Flash overlay */
#flash {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(255,0,0,0); pointer-events: none;
  transition: background 0.1s;
}

/* Math question HUD */
#math-hud {
  position: absolute; bottom: 0; left: 0; width: 100%;
  display: none; flex-direction: column; align-items: center;
  padding-bottom: 20px;
}
#math-question-box {
  background: rgba(0,0,20,0.8); border: 2px solid #60a5fa;
  border-radius: 16px; padding: 10px 28px; margin-bottom: 10px;
  color: #fff; font-size: 22px; font-weight: 800;
  text-shadow: 0 0 10px #60a5fa; backdrop-filter: blur(6px);
}
#math-answers {
  display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
}
.math-btn {
  min-width: 80px; padding: 12px 20px;
  background: rgba(30,30,80,0.85); border: 2px solid #60a5fa;
  border-radius: 12px; color: #fff; font-size: 18px; font-weight: 700;
  cursor: pointer; pointer-events: all;
  transition: background 0.15s, transform 0.1s, border-color 0.15s;
  text-shadow: 0 0 6px #60a5fa;
  user-select: none; -webkit-user-select: none;
}
.math-btn:hover { background: rgba(60,60,160,0.9); transform: scale(1.06); }
.math-btn:active { transform: scale(0.97); }
.math-btn.correct { background: rgba(0,180,60,0.9); border-color: #4ade80; }
.math-btn.wrong   { background: rgba(200,0,0,0.85); border-color: #f87171; }

/* Start / End screens */
#start-screen, #end-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.72); backdrop-filter: blur(8px);
}
#start-screen h1, #end-screen h1 {
  font-size: clamp(28px,5vw,52px); color: #fff;
  text-shadow: 0 0 20px #fbbf24; margin-bottom: 10px;
}
#start-screen p { color: #ccc; font-size: 15px; margin-bottom: 6px; text-align: center; max-width: 380px; }
.big-btn {
  margin-top: 20px; padding: 14px 48px;
  background: linear-gradient(135deg, #f59e0b, #ef4444);
  border: none; border-radius: 14px; color: #fff; font-size: 20px;
  font-weight: 800; cursor: pointer; box-shadow: 0 4px 24px rgba(245,158,11,0.5);
  transition: transform 0.15s, box-shadow 0.15s;
}
.big-btn:hover { transform: scale(1.06); box-shadow: 0 6px 32px rgba(245,158,11,0.7); }
#leaderboard { margin-top: 16px; color: #fff; width: 260px; }
#leaderboard h3 { color: #fbbf24; font-size: 16px; margin-bottom: 6px; text-align: center; }
#lb-list { list-style: none; }
#lb-list li { display: flex; justify-content: space-between; font-size: 14px; color: #d1d5db; padding: 3px 8px; border-bottom: 1px solid rgba(255,255,255,0.08); }
#lb-list li:first-child { color: #fbbf24; font-weight: 700; }
#end-stats { color: #ccc; font-size: 16px; margin-top: 8px; }
#controls-hint {
  margin-top: 12px; color: #9ca3af; font-size: 13px; text-align: center; max-width: 340px;
}

/* Combo indicator */
#combo-indicator {
  position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
  color: #4ade80; font-size: 22px; font-weight: 900;
  text-shadow: 0 0 12px #4ade80; pointer-events: none;
  opacity: 0; transition: opacity 0.3s;
}
</style>
</head>
<body>
<div id="canvas-container">
  <div id="flash"></div>

  <div id="hud">
    <div id="hud-top">
      <span class="hud-stat">🏃</span>
      <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
      <span class="hud-stat" id="hud-dist">0m / 1000m</span>
      <span class="hud-stat" id="hud-time">⏱ 0.0s</span>
      <span class="hud-stat" id="hud-speed">⚡ 8m/s</span>
    </div>
  </div>

  <div id="combo-indicator">✅ 答对了！+100分</div>

  <div id="math-hud">
    <div id="math-question-box">3 + 5 = ?</div>
    <div id="math-answers">
      <button class="math-btn" data-idx="0">1</button>
      <button class="math-btn" data-idx="1">2</button>
      <button class="math-btn" data-idx="2">3</button>
      <button class="math-btn" data-idx="3">4</button>
    </div>
  </div>

  <div id="start-screen">
    <h1>🐦 小鸟跑酷 3D</h1>
    <p>在跑道上躲避障碍，回答数学题，跑完 1000 米！</p>
    <p style="margin-top:8px;">
      <b style="color:#f87171">↑/W</b> 跳起 &nbsp;
      <b style="color:#60a5fa">←/A</b> 左移 &nbsp;
      <b style="color:#60a5fa">→/D</b> 右移
    </p>
    <p style="margin-top:4px;"><b>1/2/3/4</b> 或点击按钮选答案</p>
    <button class="big-btn" id="start-btn">🚀 开始跑步！</button>
    <div id="leaderboard">
      <h3>🏆 排行榜</h3>
      <ul id="lb-list"></ul>
    </div>
    <div id="controls-hint">📱 手机：上下左右滑动操作</div>
  </div>

  <div id="end-screen" style="display:none;">
    <h1 id="end-title">🎉 完成！</h1>
    <div id="end-stats"></div>
    <button class="big-btn" id="restart-btn">🔄 再跑一次</button>
    <div id="leaderboard" style="margin-top:16px;">
      <h3>🏆 排行榜</h3>
      <ul id="lb-list-end"></ul>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// ─── Constants ───────────────────────────────────────────────────────────────
const TRACK_LENGTH   = 1000;  // metres
const TRACK_WIDTH    = 10;    // world units
const LANE_COUNT     = 3;
const LANE_POSITIONS = [-3, 0, 3];
const SPEED_INIT     = 10;
const SPEED_MAX      = 22;
const SPEED_INC      = 0.0008; // per frame
const BIRD_Y_GROUND  = 1.0;    // bird centre when standing
const BIRD_Y_DUCK    = 0.4;
const JUMP_VY        = 9;
const GRAVITY        = 24;
const OBSTACLE_SPAWN_DIST = 90; // spawn this far ahead
const OBSTACLE_REMOVE_Z   = 4;  // remove once behind camera
const MATH_SPAWN_EVERY    = 120; // every ~120m a math gate

// Obstacle types
const OBS = { GROUND: 'ground', OVERHEAD: 'overhead', LEFT: 'left', RIGHT: 'right' };
const OBS_COLOR = {
  [OBS.GROUND]:   0xff2222,
  [OBS.OVERHEAD]: 0xffcc00,
  [OBS.LEFT]:     0x2255ff,
  [OBS.RIGHT]:    0x2255ff,
};

// ─── State ────────────────────────────────────────────────────────────────────
let scene, camera, renderer;
let bird = { mesh: null, x: 0, y: BIRD_Y_GROUND, velY: 0, ducking: false, lane: 1,
             targetX: 0, moveSpeed: 12, hitCooldown: 0, wingAngle: 0 };
let gameState = 'idle'; // idle | running | done
let distance = 0;
let elapsed  = 0;
let speed    = SPEED_INIT;
let obstacles = [];
let mathGate  = null;
let activeMath = null; // { answer, options, gate3d }
let lastObstacleZ = -OBSTACLE_SPAWN_DIST;
let nextMathAt    = MATH_SPAWN_EVERY;
let cameraShake   = { x: 0, y: 0, ttl: 0 };
let score         = 0;
let clock;
let treePool = [];
let groundTiles = [];
let groundTileZ  = 0;
const GROUND_TILE_LEN = 40;
const GROUND_TILES_N  = 10;

// ─── Three.js Init ────────────────────────────────────────────────────────────
function initThree() {
  scene    = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x87ceeb, 0.008);
  scene.background = new THREE.Color(0x87ceeb);

  camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 400);
  camera.position.set(0, 3.5, 6);
  camera.lookAt(0, 1.5, -10);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  clock = new THREE.Clock();

  // Lighting
  const ambient = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambient);
  const sun = new THREE.DirectionalLight(0xfffbe0, 1.2);
  sun.position.set(30, 80, 20);
  sun.castShadow = true;
  sun.shadow.mapSize.width  = 1024;
  sun.shadow.mapSize.height = 1024;
  sun.shadow.camera.near = 1;
  sun.shadow.camera.far  = 200;
  sun.shadow.camera.left  = -30;
  sun.shadow.camera.right  = 30;
  sun.shadow.camera.top    = 30;
  sun.shadow.camera.bottom = -30;
  scene.add(sun);

  buildSkybox();
  buildGround();
  buildTrack();
  buildSideDeco();
  buildBird();
  buildClouds();
}

function buildSkybox() {
  // Gradient sky via large sphere
  const geo  = new THREE.SphereGeometry(300, 16, 16);
  const mat  = new THREE.MeshBasicMaterial({
    color: 0x5bbcf5, side: THREE.BackSide
  });
  scene.add(new THREE.Mesh(geo, mat));

  // Sun circle
  const sunGeo = new THREE.SphereGeometry(8, 16, 16);
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xfffde0 });
  const sunMesh = new THREE.Mesh(sunGeo, sunMat);
  sunMesh.position.set(60, 100, -200);
  scene.add(sunMesh);
}

function buildGround() {
  // Grass on both sides
  const grassMat = new THREE.MeshLambertMaterial({ color: 0x5cb85c });
  const gGeo = new THREE.PlaneGeometry(200, TRACK_LENGTH * 2);
  const grass = new THREE.Mesh(gGeo, grassMat);
  grass.rotation.x = -Math.PI / 2;
  grass.position.y = -0.05;
  grass.receiveShadow = true;
  scene.add(grass);

  // Tiling road segments (recycled)
  const roadMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
  for (let i = 0; i < GROUND_TILES_N; i++) {
    const geo  = new THREE.PlaneGeometry(TRACK_WIDTH, GROUND_TILE_LEN);
    const mesh = new THREE.Mesh(geo, roadMat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.y = 0.01;
    mesh.receiveShadow = true;
    scene.add(mesh);
    groundTiles.push(mesh);
    // Grid lines overlay
    addGridLines(mesh, i);
  }
  positionGroundTiles(0);

  // Lane stripes
  buildLaneStripes();
}

function addGridLines(tileMesh, idx) {
  // No grid lines — keep road clean
}

let laneStripes = [];
function buildLaneStripes() {
  const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });
  [-1.5, 1.5].forEach(x => {
    for (let z = 10; z > -OBSTACLE_SPAWN_DIST * 1.5; z -= 6) {
      const geo  = new THREE.PlaneGeometry(0.15, 3);
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = -Math.PI / 2;
      mesh.position.set(x, 0.02, z);
      scene.add(mesh);
      decoObjects.push(mesh);
    }
  });
}

function positionGroundTiles(cameraZ) {
  groundTiles.forEach((tile, i) => {
    const z = groundTileZ - i * GROUND_TILE_LEN;
    tile.position.z = z;
  });
}

function recycleTiles(camWorldZ) {
  groundTiles.forEach(tile => {
    if (tile.position.z > camWorldZ + GROUND_TILE_LEN) {
      tile.position.z -= GROUND_TILES_N * GROUND_TILE_LEN;
    }
  });
}

function buildTrack() {
  // Guardrails on sides — short segments that recycle
  const railMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  for (let z = 10; z > -OBSTACLE_SPAWN_DIST * 1.5; z -= 8) {
    [-TRACK_WIDTH/2, TRACK_WIDTH/2].forEach(x => {
      const railGeo = new THREE.BoxGeometry(0.15, 0.6, 8);
      const rail = new THREE.Mesh(railGeo, railMat);
      rail.position.set(x, 0.3, z);
      scene.add(rail);
      decoObjects.push(rail);
      // Post
      const postGeo = new THREE.BoxGeometry(0.2, 1.2, 0.2);
      const post = new THREE.Mesh(postGeo, railMat);
      post.position.set(x, 0.6, z + 4);
      scene.add(post);
      decoObjects.push(post);
    });
  }
}

let decoObjects = []; // trees and lamps that need to move with the world

function buildSideDeco() {
  // Trees and lamps — spawn a pool that we'll recycle
  for (let z = 10; z > -OBSTACLE_SPAWN_DIST * 1.5; z -= 15) {
    [-8, 8].forEach(x => {
      if (Math.random() < 0.7) {
        const tree = buildTree();
        tree.position.set(x + (Math.random() - 0.5) * 3, 0, z);
        scene.add(tree);
        decoObjects.push(tree);
      }
      if (Math.random() < 0.3) {
        const lamp = buildLamp();
        lamp.position.set(x * 0.7, 0, z);
        scene.add(lamp);
        decoObjects.push(lamp);
      }
    });
  }
}

function recycleDecoObjects(dz) {
  decoObjects.forEach(obj => {
    obj.position.z += dz;
    // If it's behind the camera, respawn it far ahead
    if (obj.position.z > 15) {
      obj.position.z -= OBSTACLE_SPAWN_DIST * 2.5;
    }
  });
}

function buildTree() {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.3, 1.5, 8),
    new THREE.MeshLambertMaterial({ color: 0x8B4513 })
  );
  trunk.position.y = 0.75;
  g.add(trunk);
  const foliageMat = new THREE.MeshLambertMaterial({ color: 0x228B22 });
  [0, 0.7, 1.4].forEach((dy, i) => {
    const r = 1.5 - i * 0.35;
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(r, 1.5, 8),
      foliageMat
    );
    cone.position.y = 1.5 + dy + 0.6;
    g.add(cone);
  });
  return g;
}

function buildLamp() {
  const g = new THREE.Group();
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.06, 0.1, 4, 8),
    new THREE.MeshLambertMaterial({ color: 0x444444 })
  );
  pole.position.y = 2;
  g.add(pole);
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.25, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xffffcc })
  );
  head.position.y = 4.2;
  g.add(head);
  // Glow point light
  const light = new THREE.PointLight(0xffffaa, 0.5, 12);
  light.position.y = 4.2;
  g.add(light);
  return g;
}

function buildClouds() {
  const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 });
  for (let i = 0; i < 18; i++) {
    const cloud = new THREE.Group();
    const parts = 3 + Math.floor(Math.random() * 3);
    for (let p = 0; p < parts; p++) {
      const geo  = new THREE.SphereGeometry(2 + Math.random() * 2, 8, 8);
      const mesh = new THREE.Mesh(geo, cloudMat);
      mesh.position.set(p * 2.5, Math.random() * 1, Math.random() * 1);
      cloud.add(mesh);
    }
    cloud.position.set(
      (Math.random() - 0.5) * 120,
      25 + Math.random() * 20,
      -Math.random() * 400 - 30
    );
    cloud.userData.speed = 0.5 + Math.random() * 0.5;
    scene.add(cloud);
  }
}

// ─── Bird ─────────────────────────────────────────────────────────────────────
function buildBird() {
  const g = new THREE.Group();

  // Body (sphere)
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(0.55, 16, 16),
    new THREE.MeshLambertMaterial({ color: 0xfacc15 })
  );
  body.castShadow = true;
  g.add(body);

  // Head
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.38, 14, 14),
    new THREE.MeshLambertMaterial({ color: 0xfde047 })
  );
  head.position.set(0, 0.55, 0.25);
  head.castShadow = true;
  g.add(head);

  // Beak (cone)
  const beak = new THREE.Mesh(
    new THREE.ConeGeometry(0.12, 0.35, 8),
    new THREE.MeshLambertMaterial({ color: 0xf97316 })
  );
  beak.rotation.x = Math.PI / 2;
  beak.position.set(0, 0.5, 0.65);
  g.add(beak);

  // Eye L
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
  const eyeGeo = new THREE.SphereGeometry(0.07, 8, 8);
  const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
  eyeL.position.set(-0.2, 0.65, 0.52);
  g.add(eyeL);
  const eyeR = eyeL.clone();
  eyeR.position.x = 0.2;
  g.add(eyeR);

  // Wings
  const wingMat = new THREE.MeshLambertMaterial({ color: 0xf59e0b });
  const wingGeo = new THREE.SphereGeometry(0.35, 12, 6, 0, Math.PI);
  const wingL = new THREE.Mesh(wingGeo, wingMat);
  wingL.position.set(-0.58, 0, 0);
  wingL.rotation.z = 0.4;
  wingL.castShadow = true;
  g.add(wingL);
  const wingR = wingL.clone();
  wingR.position.x = 0.58;
  wingR.rotation.z = -0.4;
  g.add(wingR);

  // Store refs for animation
  bird.mesh   = g;
  bird.wingL  = wingL;
  bird.wingR  = wingR;
  g.position.set(0, BIRD_Y_GROUND, 0);
  scene.add(g);
}

// ─── Obstacle builder ─────────────────────────────────────────────────────────
function makeTextSprite(text, scale = 1) {
  const canvas = document.createElement('canvas');
  canvas.width  = 512; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Auto-size font based on text length
  const fontSize = text.length > 8 ? 60 : text.length > 4 ? 80 : 120;
  ctx.font = `bold ${fontSize}px Arial`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 4;
  ctx.strokeText(text, canvas.width / 2, canvas.height / 2);
  ctx.fillText(text, canvas.width / 2, canvas.height / 2);
  const tex  = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  const mat  = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  const spr  = new THREE.Sprite(mat);
  const aspect = canvas.width / canvas.height;
  spr.scale.set(scale * aspect, scale, 1);
  return spr;
}

function buildObstacle(type, z) {
  const g    = new THREE.Group();
  const col  = OBS_COLOR[type];
  const mat  = new THREE.MeshLambertMaterial({ color: col, emissive: col, emissiveIntensity: 0.15 });
  const glow = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.18, wireframe: true });

  let hitBox; // {xmin,xmax,ymin,ymax} relative
  let arrowText = '';

  if (type === OBS.GROUND) {
    // Big red block on ground
    const geo = new THREE.BoxGeometry(TRACK_WIDTH * 0.6, 2.2, 2.6);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = 1.1;
    mesh.castShadow = true;
    g.add(mesh);
    const wireframe = new THREE.Mesh(
      new THREE.BoxGeometry(TRACK_WIDTH * 0.6 + 0.1, 2.3, 2.7), glow
    );
    wireframe.position.y = 1.15;
    g.add(wireframe);
    hitBox    = { xmin: -TRACK_WIDTH * 0.3, xmax: TRACK_WIDTH * 0.3, ymin: 0, ymax: 2.2 };
    arrowText = '⬆';
    g.userData.action = OBS.GROUND;
  }
  else if (type === OBS.OVERHEAD) {
    // Yellow overhead bar
    const barH   = 1.0;
    const clearY = 1.5; // clearance bottom
    const geo = new THREE.BoxGeometry(TRACK_WIDTH * 0.9, barH, 1.0);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = clearY + barH / 2 + 1.0; // hangs at ~2.5-3.5
    mesh.castShadow = true;
    g.add(mesh);
    const wireframe = new THREE.Mesh(
      new THREE.BoxGeometry(TRACK_WIDTH * 0.9 + 0.1, barH + 0.1, 1.1), glow
    );
    wireframe.position.y = mesh.position.y;
    g.add(wireframe);
    // Vertical supports
    const suppMat = new THREE.MeshLambertMaterial({ color: col });
    const suppGeo = new THREE.BoxGeometry(0.2, clearY + barH + 1.0, 0.2);
    [-TRACK_WIDTH * 0.4, TRACK_WIDTH * 0.4].forEach(sx => {
      const s = new THREE.Mesh(suppGeo, suppMat);
      s.position.set(sx, (clearY + barH + 1.0) / 2, 0);
      g.add(s);
    });
    hitBox    = { xmin: -TRACK_WIDTH * 0.45, xmax: TRACK_WIDTH * 0.45, ymin: clearY, ymax: clearY + barH + 1.0 };
    arrowText = '⬇';
    g.userData.action = OBS.OVERHEAD;
  }
  else if (type === OBS.LEFT) {
    // Blue left side blocker
    const geo = new THREE.BoxGeometry(TRACK_WIDTH * 0.48, 2.8, 2.2);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(-TRACK_WIDTH * 0.26, 1.4, 0);
    mesh.castShadow = true;
    g.add(mesh);
    const wireframe = new THREE.Mesh(
      new THREE.BoxGeometry(TRACK_WIDTH * 0.5, 2.9, 2.3), glow
    );
    wireframe.position.set(-TRACK_WIDTH * 0.26, 1.45, 0);
    g.add(wireframe);
    hitBox    = { xmin: -TRACK_WIDTH * 0.5, xmax: -TRACK_WIDTH * 0.02, ymin: 0, ymax: 2.8 };
    arrowText = '➡';
    g.userData.action = OBS.LEFT;
  }
  else { // RIGHT
    const geo = new THREE.BoxGeometry(TRACK_WIDTH * 0.48, 2.8, 2.2);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(TRACK_WIDTH * 0.26, 1.4, 0);
    mesh.castShadow = true;
    g.add(mesh);
    const wireframe = new THREE.Mesh(
      new THREE.BoxGeometry(TRACK_WIDTH * 0.5, 2.9, 2.3), glow
    );
    wireframe.position.set(TRACK_WIDTH * 0.26, 1.45, 0);
    g.add(wireframe);
    hitBox    = { xmin: TRACK_WIDTH * 0.02, xmax: TRACK_WIDTH * 0.5, ymin: 0, ymax: 2.8 };
    arrowText = '⬅';
    g.userData.action = OBS.RIGHT;
  }

  // Arrow sprite on top
  const arrow = makeTextSprite(arrowText, 2.5);
  arrow.position.set(0, 3.8, 0);
  g.add(arrow);

  g.position.set(0, 0, z);
  g.userData.type    = type;
  g.userData.hitBox  = hitBox;
  g.userData.hit     = false;
  g.userData.glowAge = 0;

  scene.add(g);
  obstacles.push(g);
}

// ─── Math gate ────────────────────────────────────────────────────────────────
function buildMathGate(z) {
  const a = Math.floor(Math.random() * 15) + 2;
  const b = Math.floor(Math.random() * Math.min(a, 10));
  const isAdd = Math.random() > 0.4;
  const answer = isAdd ? a + b : a - b;
  const question = isAdd ? `${a} + ${b} = ?` : `${a} - ${b} = ?`;

  // Generate 4 unique options incl. answer
  const opts = new Set([answer]);
  while (opts.size < 4) {
    const fake = answer + (Math.random() < 0.5 ? 1 : -1) * (Math.floor(Math.random() * 4) + 1);
    if (fake >= 0 && fake <= 20) opts.add(fake);
  }
  const options = shuffleArray([...opts]);

  // 3D gate
  const g = new THREE.Group();
  const gateW = TRACK_WIDTH;
  const gateH = 5;

  // Gate frame
  const frameMat = new THREE.MeshBasicMaterial({ color: 0x60a5fa, transparent: true, opacity: 0.7, side: THREE.DoubleSide });
  const frameMesh = new THREE.Mesh(new THREE.PlaneGeometry(gateW, gateH), frameMat);
  frameMesh.position.y = gateH / 2;
  g.add(frameMesh);

  // Wireframe border
  const edgeMat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
  const hw = gateW / 2, hh = gateH;
  const pts = [
    -hw, 0, 0,   hw, 0, 0,
     hw, 0, 0,   hw, hh, 0,
     hw, hh, 0, -hw, hh, 0,
    -hw, hh, 0, -hw, 0, 0,
  ];
  const edgeGeo = new THREE.BufferGeometry();
  edgeGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pts), 3));
  g.add(new THREE.LineSegments(edgeGeo, edgeMat));

  // Question label via sprite
  const qSprite = makeTextSprite(question, 5.5);
  qSprite.position.set(0, gateH * 0.65, 0.1);
  g.add(qSprite);

  g.position.set(0, 0, z);
  g.userData.answer  = answer;
  g.userData.options = options;
  g.userData.question = question;
  g.userData.active  = true;
  g.userData.hit     = false;
  g.userData.glowAge = 0;
  g.userData.matRef  = frameMesh.material;

  scene.add(g);
  mathGate = g;
  activeMath = { answer, options, question };

  // Show HUD
  showMathHUD(question, options);
}

function showMathHUD(question, options) {
  document.getElementById('math-question-box').textContent = question;
  const btns = document.querySelectorAll('.math-btn');
  btns.forEach((btn, i) => {
    btn.textContent = options[i] !== undefined ? options[i] : '';
    btn.className = 'math-btn';
    btn.dataset.value = options[i];
  });
  document.getElementById('math-hud').style.display = 'flex';
}

function hideMathHUD() {
  document.getElementById('math-hud').style.display = 'none';
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function spawnObstacle(worldZ) {
  const types = [OBS.GROUND, OBS.LEFT, OBS.RIGHT];
  const type = types[Math.floor(Math.random() * types.length)];
  buildObstacle(type, worldZ - OBSTACLE_SPAWN_DIST);
}

function cleanupObstacles() {
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    if (o.position.z > OBSTACLE_REMOVE_Z) {
      scene.remove(o);
      obstacles.splice(i, 1);
    }
  }
}

// ─── Collision Detection ──────────────────────────────────────────────────────
function checkCollisions() {
  if (bird.hitCooldown > 0) return;

  const bx = bird.mesh.position.x;
  const by = bird.mesh.position.y;
  const bz = 0; // bird always at z=0 in world coords we shift the obstacles

  for (const obs of obstacles) {
    if (obs.userData.hit) continue;
    const oz = obs.position.z;
    if (oz > 1.5 || oz < -3) continue; // rough z cull

    const hb = obs.userData.hitBox;
    if (bx > hb.xmin && bx < hb.xmax &&
        by > hb.ymin && by < hb.ymax) {
      triggerHit();
      obs.userData.hit = true;
      return;
    }
  }

  // Math gate collision
  if (mathGate && mathGate.userData.active) {
    const gz = mathGate.position.z;
    if (gz > -1.5 && gz < 1.5) {
      // Collided with unanswered gate
      triggerHit();
      mathGate.userData.active = false;
      mathGate.userData.matRef.color.set(0xff2222);
      mathGate.userData.matRef.opacity = 0.9;
      hideMathHUD();
      // Pause at gate
      bird.hitCooldown = 1.2;
      activeMath = null;
    }
  }
}

function triggerHit() {
  if (bird.hitCooldown > 0) return;
  bird.hitCooldown = 1.0;
  // Screen flash
  const flash = document.getElementById('flash');
  flash.style.background = 'rgba(255,0,0,0.45)';
  setTimeout(() => { flash.style.background = 'rgba(255,0,0,0)'; }, 300);
  // Camera shake
  cameraShake = { x: 0.3, y: 0.2, ttl: 0.5 };
}

// ─── Math answer ──────────────────────────────────────────────────────────────
function submitAnswer(val) {
  if (!activeMath || !mathGate || !mathGate.userData.active) return;
  const correct = val === activeMath.answer;
  const btns = document.querySelectorAll('.math-btn');
  btns.forEach(btn => {
    if (parseInt(btn.dataset.value) === activeMath.answer) btn.classList.add('correct');
    else if (parseInt(btn.dataset.value) === val && !correct) btn.classList.add('wrong');
  });

  if (correct) {
    // Gate disappears with green effect
    scene.remove(mathGate);
    mathGate = null;
    activeMath = null;
    hideMathHUD();
    score += 100;
    showCombo('✅ 答对了！+100');
    setTimeout(hideMathHUD, 200);
  } else {
    // Gate locks — flash red
    mathGate.userData.active = false;
    mathGate.userData.matRef.color.set(0xff0000);
    mathGate.userData.matRef.opacity = 0.85;
    triggerHit();
    activeMath = null;
    setTimeout(hideMathHUD, 800);
  }
}

function showCombo(text) {
  const el = document.getElementById('combo-indicator');
  el.textContent = text;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 1500);
}

// ─── Game Loop ────────────────────────────────────────────────────────────────
let worldZ = 0; // how far we've moved in world Z (bird stays at 0, world moves)

function startGame() {
  // Reset state
  distance = 0; elapsed = 0; speed = SPEED_INIT; score = 0;
  worldZ = 0; lastObstacleZ = 0; nextMathAt = MATH_SPAWN_EVERY;
  bird.x = 0; bird.y = BIRD_Y_GROUND; bird.velY = 0;
  bird.ducking = false; bird.hitCooldown = 0;
  bird.mesh.position.set(0, BIRD_Y_GROUND, 0);
  bird.mesh.rotation.set(0, Math.PI, 0);

  // Clear obstacles & gate
  obstacles.forEach(o => scene.remove(o));
  obstacles.length = 0;
  if (mathGate) { scene.remove(mathGate); mathGate = null; }
  activeMath = null;
  hideMathHUD();

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('end-screen').style.display   = 'none';

  gameState = 'running';
  clock.start();
}

function gameLoop() {
  requestAnimationFrame(gameLoop);

  const dt = Math.min(clock.getDelta(), 0.05);

  if (gameState === 'running') {
    update(dt);
  }

  animateClouds(dt);
  renderer.render(scene, camera);
}

function update(dt) {
  elapsed += dt;
  speed    = Math.min(SPEED_MAX, speed + SPEED_INC * 60 * dt);

  if (bird.hitCooldown > 0) {
    bird.hitCooldown -= dt;
    if (bird.hitCooldown < 0) bird.hitCooldown = 0;
  }

  const moveDist = (bird.hitCooldown > 0) ? 0 : speed * dt;
  distance   += moveDist;
  worldZ     += moveDist;

  // Move all scene objects toward camera
  const dz = moveDist;
  obstacles.forEach(o => { o.position.z += dz; });
  if (mathGate) mathGate.position.z += dz;
  groundTiles.forEach(t => { t.position.z += dz; });
  recycleDecoObjects(dz);

  // Recycle ground tiles
  recycleTiles(0);

  // Spawn obstacles (minimum 15m spacing, up to 25m)
  if (worldZ - lastObstacleZ > 15 + Math.random() * 10) {
    // Don't spawn if there's an active math gate ahead
    if (!mathGate) {
      spawnObstacle(worldZ);
      lastObstacleZ = worldZ;
    }
  }

  // Spawn math gate
  if (distance >= nextMathAt && !mathGate) {
    const z = -OBSTACLE_SPAWN_DIST * 0.8;
    buildMathGate(z);
    nextMathAt += MATH_SPAWN_EVERY;
  }

  // Cleanup
  cleanupObstacles();

  // Bird physics
  if (bird.velY !== 0 || bird.y > BIRD_Y_GROUND + 0.01) {
    bird.velY -= GRAVITY * dt;
    bird.y    += bird.velY * dt;
    if (bird.y <= BIRD_Y_GROUND) {
      bird.y    = BIRD_Y_GROUND;
      bird.velY = 0;
    }
  }

  // Smooth horizontal movement
  bird.mesh.position.x += (bird.targetX - bird.mesh.position.x) * Math.min(1, bird.moveSpeed * dt);
  bird.mesh.position.y = bird.ducking
    ? BIRD_Y_DUCK + (bird.y - BIRD_Y_GROUND) * 0.3
    : bird.y;

  // Duck squash
  if (bird.ducking) {
    bird.mesh.scale.set(1.2, 0.65, 1.2);
  } else {
    bird.mesh.scale.set(1, 1, 1);
  }

  // Wing flap
  bird.wingAngle += dt * 8;
  if (bird.wingL) {
    bird.wingL.rotation.z = 0.4 + Math.sin(bird.wingAngle) * 0.45;
    bird.wingR.rotation.z = -(0.4 + Math.sin(bird.wingAngle) * 0.45);
  }

  // Camera follows bird with shake
  let camX = bird.mesh.position.x * 0.6;
  let camY = 3.5;
  if (cameraShake.ttl > 0) {
    cameraShake.ttl -= dt;
    const s = cameraShake.ttl / 0.5;
    camX += (Math.random() - 0.5) * cameraShake.x * s;
    camY += (Math.random() - 0.5) * cameraShake.y * s;
  }
  camera.position.x += (camX - camera.position.x) * 8 * dt;
  camera.position.y += (camY - camera.position.y) * 6 * dt;
  camera.position.z  = 6;
  camera.lookAt(bird.mesh.position.x * 0.3, 1.5, -10);

  // Obstacle glow pulse (flicker when close)
  obstacles.forEach(obs => {
    obs.userData.glowAge += dt;
    const dist = Math.abs(obs.position.z);
    if (dist < 30) {
      const flash = 0.5 + 0.5 * Math.sin(obs.userData.glowAge * 8);
      obs.children.forEach(c => {
        if (c.material && c.material.emissiveIntensity !== undefined) {
          c.material.emissiveIntensity = 0.1 + flash * 0.5;
        }
      });
    }
  });

  // Math gate glow
  if (mathGate && mathGate.userData.active) {
    mathGate.userData.glowAge += dt;
    const pulse = 0.45 + 0.35 * Math.sin(mathGate.userData.glowAge * 5);
    mathGate.userData.matRef.opacity = pulse;
  }

  // Collision
  checkCollisions();

  // HUD update
  updateHUD();

  // Finish
  if (distance >= TRACK_LENGTH) {
    finishGame();
  }
}

function updateHUD() {
  const pct = Math.min(100, (distance / TRACK_LENGTH) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('hud-dist').textContent = `${Math.floor(distance)}m / ${TRACK_LENGTH}m`;
  document.getElementById('hud-time').textContent = `⏱ ${elapsed.toFixed(1)}s`;
  document.getElementById('hud-speed').textContent = `⚡ ${speed.toFixed(1)}m/s`;
}

function animateClouds(dt) {
  scene.children.forEach(c => {
    if (c.userData.speed) c.position.x += c.userData.speed * dt;
    if (c.position.x > 80) c.position.x = -80;
  });
}

function finishGame() {
  gameState = 'done';
  hideMathHUD();

  // Save to leaderboard
  const entry = { time: elapsed.toFixed(1), score, date: new Date().toLocaleDateString() };
  const lb = JSON.parse(localStorage.getItem('birdrunner3d_lb') || '[]');
  lb.push(entry);
  lb.sort((a, b) => parseFloat(a.time) - parseFloat(b.time));
  lb.splice(10);
  localStorage.setItem('birdrunner3d_lb', JSON.stringify(lb));

  document.getElementById('end-title').textContent = `🎉 完成！得分 ${score}`;
  document.getElementById('end-stats').innerHTML =
    `用时：<b>${elapsed.toFixed(1)}s</b> &nbsp; 速度峰值：<b>${speed.toFixed(1)}m/s</b>`;
  renderLeaderboard('lb-list-end', lb);
  document.getElementById('end-screen').style.display = 'flex';
}

function renderLeaderboard(listId, lb) {
  const ul = document.getElementById(listId);
  ul.innerHTML = '';
  if (!lb.length) {
    ul.innerHTML = '<li style="color:#9ca3af">暂无记录</li>';
    return;
  }
  lb.forEach((e, i) => {
    const li = document.createElement('li');
    li.innerHTML = `<span>${i + 1}. ${e.date}</span><span>${e.time}s · ${e.score || 0}分</span>`;
    ul.appendChild(li);
  });
}

// ─── Input ────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  if (gameState !== 'running') return;
  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W':
      if (bird.y <= BIRD_Y_GROUND + 0.05 && bird.velY === 0) bird.velY = JUMP_VY;
      break;
    case 'ArrowLeft': case 'a': case 'A':
      bird.targetX = Math.max(-TRACK_WIDTH / 2 + 1, bird.targetX - 3.2);
      break;
    case 'ArrowRight': case 'd': case 'D':
      bird.targetX = Math.min(TRACK_WIDTH / 2 - 1, bird.targetX + 3.2);
      break;
    case '1': case '2': case '3': case '4':
      const idx = parseInt(e.key) - 1;
      if (activeMath) submitAnswer(activeMath.options[idx]);
      break;
  }
});
document.addEventListener('keyup', e => {
});

// Touch
let touchStart = null;
document.addEventListener('touchstart', e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
document.addEventListener('touchend', e => {
  if (!touchStart || gameState !== 'running') return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  const adx = Math.abs(dx), ady = Math.abs(dy);
  if (adx < 10 && ady < 10) return;
  if (ady > adx) {
    if (dy < -20) { // swipe up = jump
      if (bird.y <= BIRD_Y_GROUND + 0.05 && bird.velY === 0) bird.velY = JUMP_VY;
    }
  } else {
    if (dx < -20) bird.targetX = Math.max(-TRACK_WIDTH/2+1, bird.targetX - 3.2);
    else          bird.targetX = Math.min(TRACK_WIDTH/2-1,  bird.targetX + 3.2);
  }
  touchStart = null;
}, { passive: true });

// Math answer buttons
document.querySelectorAll('.math-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (activeMath) submitAnswer(parseInt(btn.dataset.value));
  });
  btn.addEventListener('touchstart', e => { e.stopPropagation(); }, { passive: true });
});

// ─── Screen buttons ───────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
initThree();
gameLoop();

// Load existing leaderboard on start screen
const savedLb = JSON.parse(localStorage.getItem('birdrunner3d_lb') || '[]');
renderLeaderboard('lb-list', savedLb);
</script>
