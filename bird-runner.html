<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐦 小鸟跑酷</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
    overflow: hidden;
    user-select: none;
  }
  #gameContainer {
    position: relative;
    width: 100%;
    max-width: 800px;
  }
  #gameCanvas {
    display: block;
    width: 100%;
    border-radius: 12px;
    box-shadow: 0 0 30px rgba(100, 200, 255, 0.3);
    cursor: pointer;
  }
  /* HUD 覆盖层 */
  #hud {
    position: absolute;
    top: 8px;
    left: 0;
    right: 0;
    padding: 0 12px;
    pointer-events: none;
  }
  #progressBarContainer {
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    height: 14px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.3);
  }
  #progressBar {
    height: 100%;
    background: linear-gradient(90deg, #4cef5c, #ffe234);
    border-radius: 6px;
    transition: width 0.1s;
    width: 0%;
  }
  #stats {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    font-size: 13px;
    color: #fff;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    font-weight: bold;
  }
  /* 数学题面板 */
  #mathPanel {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    pointer-events: auto;
    z-index: 10;
  }
  #mathQuestion {
    background: rgba(80, 0, 120, 0.85);
    border: 3px solid gold;
    border-radius: 16px;
    padding: 8px 24px;
    font-size: 22px;
    color: #fff;
    font-weight: bold;
    text-shadow: 0 0 8px gold;
  }
  #mathOptions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .mathBtn {
    width: 70px;
    height: 50px;
    font-size: 18px;
    font-weight: bold;
    border: 3px solid gold;
    border-radius: 12px;
    background: linear-gradient(135deg, #6a00c8, #a040ff);
    color: #fff;
    cursor: pointer;
    transition: transform 0.1s, background 0.1s;
    box-shadow: 0 3px 8px rgba(0,0,0,0.4);
    -webkit-tap-highlight-color: transparent;
  }
  .mathBtn:active {
    transform: scale(0.92);
    background: linear-gradient(135deg, #8800ff, #cc66ff);
  }
  /* 开始/结束屏 */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.65);
    border-radius: 12px;
    z-index: 20;
    gap: 14px;
    padding: 20px;
  }
  #overlay h1 { font-size: 36px; color: #ffe234; text-shadow: 2px 2px 0 #e07000; }
  #overlay p  { font-size: 15px; color: #cce; text-align: center; line-height: 1.7; }
  #startBtn {
    margin-top: 8px;
    padding: 14px 48px;
    font-size: 20px;
    font-weight: bold;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg, #4cef5c, #1ad048);
    color: #004010;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,220,70,0.5);
    transition: transform 0.1s;
  }
  #startBtn:active { transform: scale(0.95); }
  #leaderboard {
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px 20px;
    max-width: 280px;
    width: 100%;
  }
  #leaderboard h3 { color: gold; font-size: 15px; margin-bottom: 6px; text-align: center; }
  #leaderboard ol { color: #ddf; font-size: 13px; padding-left: 20px; }
  #leaderboard li { margin: 2px 0; }

  /* 方向按钮 (移动端) */
  #dpad {
    position: absolute;
    bottom: 8px;
    left: 8px;
    display: none;
    grid-template-columns: repeat(3, 44px);
    grid-template-rows: repeat(3, 44px);
    gap: 4px;
    pointer-events: auto;
    z-index: 10;
  }
  .dpadBtn {
    width: 44px;
    height: 44px;
    font-size: 22px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 10px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(4px);
    transition: background 0.1s;
  }
  .dpadBtn:active { background: rgba(255,255,255,0.35); }
  .dpadEmpty { background: transparent; border: none; pointer-events: none; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="800" height="400"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="progressBarContainer"><div id="progressBar"></div></div>
    <div id="stats">
      <span id="distStat">📍 0 / 1000m</span>
      <span id="timeStat">⏱ 0.0s</span>
      <span id="speedStat">💨 速度: 1x</span>
    </div>
  </div>

  <!-- 数学题 -->
  <div id="mathPanel">
    <div id="mathQuestion">7 + 8 = ?</div>
    <div id="mathOptions">
      <button class="mathBtn" data-idx="0">14</button>
      <button class="mathBtn" data-idx="1">15</button>
      <button class="mathBtn" data-idx="2">16</button>
      <button class="mathBtn" data-idx="3">12</button>
    </div>
  </div>

  <!-- 方向键 (移动端) -->
  <div id="dpad">
    <div class="dpadEmpty"></div>
    <button class="dpadBtn" id="dUp">⬆️</button>
    <div class="dpadEmpty"></div>
    <button class="dpadBtn" id="dLeft">⬅️</button>
    <div class="dpadEmpty"></div>
    <button class="dpadBtn" id="dRight">➡️</button>
    <div class="dpadEmpty"></div>
    <button class="dpadBtn" id="dDown">⬇️</button>
    <div class="dpadEmpty"></div>
  </div>

  <!-- 开始/结束覆盖层 -->
  <div id="overlay">
    <h1>🐦 小鸟跑酷</h1>
    <p>
      ⬆️/W — 飞上躲地面障碍<br>
      ⬇️/S — 飞下躲上方障碍<br>
      ➡️/D — 右闪躲左来障碍<br>
      ⬅️/A — 左闪躲右来障碍<br>
      1/2/3/4 — 回答数学题
    </p>
    <div id="leaderboard">
      <h3>🏆 最佳成绩</h3>
      <ol id="lbList"><li>暂无记录</li></ol>
    </div>
    <button id="startBtn">开始冒险！</button>
  </div>
</div>

<script>
// =============================================
// 小鸟跑酷 — Canvas 2D 游戏
// =============================================

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// ---------- 响应式尺寸 ----------
const BASE_W = 800, BASE_H = 400;
function resizeCanvas() {
  const ratio  = window.devicePixelRatio || 1;
  const cw     = canvas.clientWidth;
  const ch     = cw * (BASE_H / BASE_W);
  canvas.height = ch;
  // HiDPI: 保持逻辑尺寸 800x400 但用 CSS 缩放
  canvas.width  = BASE_W;
  canvas.height = BASE_H;
  // 检测是否是移动端
  document.getElementById('dpad').style.display =
    ('ontouchstart' in window) ? 'grid' : 'none';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ---------- 常量 ----------
const GROUND_Y   = BASE_H - 60; // 地面 Y 坐标
const BIRD_X_BASE = 140;        // 小鸟基础 X（屏幕中偏左）
const TOTAL_DIST  = 1000;       // 总距离 (m)
const BIRD_RADIUS = 22;

// ---------- 游戏状态 ----------
let state = 'idle'; // idle | playing | finish
let startTime, elapsedMs;
let distance = 0;
let speed    = 3.5;   // px/frame (在 60fps 下对应 ~m/s)
let speedMulti = 1;
let frameCount = 0;

// 小鸟对象
const bird = {
  x: BIRD_X_BASE,
  y: GROUND_Y - 30,        // 垂直位置
  vy: 0,                   // 垂直速度
  vx: 0,                   // 水平偏移速度
  baseX: BIRD_X_BASE,
  baseY: GROUND_Y - 30,
  dodgeY: 0,               // 垂直回避偏移
  dodgeX: 0,               // 水平回避偏移
  shakeTimer: 0,           // 震动计时
  stunTimer: 0,            // 卡停计时 (ms)
  wingAngle: 0,            // 翅膀扇动角度
  alive: true,
  facingRight: true
};

// ---------- 背景层 ----------
const bgLayers = [
  { // 远山
    items: generateMountains(8),
    speed: 0.3,
    offsetX: 0
  },
  { // 中层云
    items: generateClouds(6),
    speed: 0.7,
    offsetX: 0
  },
  { // 近景树
    items: generateTrees(10),
    speed: 1.5,
    offsetX: 0
  }
];

function generateMountains(n) {
  const arr = [];
  for (let i = 0; i < n; i++) {
    arr.push({
      x: (BASE_W / n) * i + Math.random() * 60,
      h: 80 + Math.random() * 80,
      w: 120 + Math.random() * 80
    });
  }
  return arr;
}
function generateClouds(n) {
  const arr = [];
  for (let i = 0; i < n; i++) {
    arr.push({
      x: (BASE_W / n) * i + Math.random() * 80,
      y: 30 + Math.random() * 100,
      r: 22 + Math.random() * 18
    });
  }
  return arr;
}
function generateTrees(n) {
  const arr = [];
  for (let i = 0; i < n; i++) {
    arr.push({
      x: (BASE_W / n) * i + Math.random() * 40,
      h: 40 + Math.random() * 30
    });
  }
  return arr;
}

// ---------- 障碍物系统 ----------
// type: 'bottom'|'top'|'left'|'right'
// state: 'warning'|'active'|'dead'
let obstacles = [];
let nextObstacleIn = 120; // 帧倒计时

function spawnObstacle() {
  const types = ['bottom', 'top', 'left', 'right'];
  const type  = types[Math.floor(Math.random() * types.length)];
  const obs = {
    type,
    state: 'warning',
    warningTimer: 90, // 帧数，约 1.5s 警告时间
    x: BASE_W + 60,
    y: getObstacleY(type),
    w: 36, h: 36,
    hit: false
  };
  // 左侧来的障碍从左边出现
  if (type === 'left') obs.x = -60;
  if (type === 'right') obs.x = BASE_W + 60;
  obstacles.push(obs);
  nextObstacleIn = 140 + Math.floor(Math.random() * 100);
}

function getObstacleY(type) {
  if (type === 'bottom') return GROUND_Y - 10;
  if (type === 'top')    return 60;
  // left/right — 飞向小鸟的高度
  return bird.baseY - 10 + (Math.random() - 0.5) * 40;
}

// ---------- 数学门系统 ----------
let mathGate = null;  // 当前数学门
let mathPanel = document.getElementById('mathPanel');
let mathQuestion = document.getElementById('mathQuestion');
let mathBtns = document.querySelectorAll('.mathBtn');

function generateMathQuestion() {
  let a, b, op, answer;
  if (Math.random() < 0.5) {
    // 加法
    a = Math.floor(Math.random() * 10) + 1;
    b = Math.floor(Math.random() * (20 - a)) + 1;
    op = '+';
    answer = a + b;
  } else {
    // 减法
    a = Math.floor(Math.random() * 19) + 1;
    b = Math.floor(Math.random() * a) + 1;
    op = '-';
    answer = a - b;
  }
  const questionText = `${a} ${op} ${b} = ?`;
  // 生成 4 个选项，其中一个是正确答案
  const options = [answer];
  const offsets = [-3, -2, -1, 1, 2, 3];
  const used = new Set([answer]);
  while (options.length < 4) {
    const offset = offsets[Math.floor(Math.random() * offsets.length)];
    const wrong  = answer + offset;
    if (wrong >= 0 && wrong <= 20 && !used.has(wrong)) {
      options.push(wrong);
      used.add(wrong);
    }
  }
  // 打乱选项
  for (let i = options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [options[i], options[j]] = [options[j], options[i]];
  }
  const correctIdx = options.indexOf(answer);
  return { questionText, options, correctIdx, answer };
}

function spawnMathGate() {
  if (mathGate) return; // 已有门
  const q = generateMathQuestion();
  mathGate = {
    x: BASE_W + 80,
    y: 80,
    w: 100,
    h: BASE_H - 80 - 60, // 全高
    q,
    state: 'waiting', // waiting | locked | passed
    lockTimer: 0
  };
  // 更新 UI
  mathQuestion.textContent = q.questionText;
  mathBtns.forEach((btn, i) => {
    btn.textContent = q.options[i];
    btn.style.borderColor = 'gold';
    btn.style.background  = 'linear-gradient(135deg,#6a00c8,#a040ff)';
  });
  mathPanel.style.display = 'flex';
}

let nextMathGateIn = 300; // 帧倒计时

// ---------- 输入系统 ----------
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  // 数学题快捷键 1-4
  if (mathGate && mathGate.state === 'waiting') {
    const idx = ['1','2','3','4'].indexOf(e.key);
    if (idx >= 0) answerMath(idx);
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','s','a','d',' '].includes(e.key)) {
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// 触摸滑动
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
canvas.addEventListener('touchend', e => {
  if (state !== 'playing') return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (absDx < 10 && absDy < 10) return;
  if (absDy > absDx) {
    if (dy < 0) triggerDodge('up');
    else        triggerDodge('down');
  } else {
    if (dx > 0) triggerDodge('right');
    else        triggerDodge('left');
  }
}, { passive: true });

// 方向按钮
document.getElementById('dUp').addEventListener('touchstart',    () => triggerDodge('up'),    { passive: true });
document.getElementById('dDown').addEventListener('touchstart',  () => triggerDodge('down'),  { passive: true });
document.getElementById('dLeft').addEventListener('touchstart',  () => triggerDodge('left'),  { passive: true });
document.getElementById('dRight').addEventListener('touchstart', () => triggerDodge('right'), { passive: true });

// 数学按钮
mathBtns.forEach((btn, i) => {
  btn.addEventListener('click',      () => answerMath(i));
  btn.addEventListener('touchstart', () => answerMath(i), { passive: true });
});

// 上次方向（防止连续触发）
let lastDodge = '';
let dodgeTimer = 0;

function triggerDodge(dir) {
  if (state !== 'playing') return;
  if (bird.stunTimer > 0) return;
  lastDodge = dir;
  dodgeTimer = 15; // 15帧内有效
}

// ---------- 碰撞/惩罚 ----------
function hitObstacle() {
  if (bird.stunTimer > 0) return;
  bird.shakeTimer = 30;
  bird.stunTimer  = 60; // 1秒 (60帧)
  speed = 0;
  speedMulti = 0;
}

// ---------- 数学回答 ----------
function answerMath(idx) {
  if (!mathGate || mathGate.state !== 'waiting') return;
  if (idx === mathGate.q.correctIdx) {
    // 答对！门消失
    mathGate.state  = 'passed';
    mathPanel.style.display = 'none';
    // 0.5秒后移除
    setTimeout(() => { mathGate = null; }, 500);
  } else {
    // 答错！门变红，锁住
    mathGate.state  = 'locked';
    mathPanel.style.display = 'none';
    mathBtns.forEach(btn => { btn.style.borderColor = '#ff3333'; });
  }
}

// ---------- 渲染函数 ----------

// 绘制渐变天空
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0,   '#1a6bcc');
  grad.addColorStop(0.5, '#4ba8e8');
  grad.addColorStop(1,   '#b0d8f8');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, BASE_W, GROUND_Y);
}

// 绘制地面（多层）
function drawGround() {
  // 深草
  const grad = ctx.createLinearGradient(0, GROUND_Y, 0, BASE_H);
  grad.addColorStop(0,   '#4caf50');
  grad.addColorStop(0.3, '#388e3c');
  grad.addColorStop(1,   '#1b5e20');
  ctx.fillStyle = grad;
  ctx.fillRect(0, GROUND_Y, BASE_W, BASE_H - GROUND_Y);
  // 草地边缘高光
  ctx.fillStyle = '#66bb6a';
  ctx.fillRect(0, GROUND_Y, BASE_W, 8);
}

// 绘制背景层（视差）
function drawBgLayer(layer) {
  const { items, offsetX } = layer;
  items.forEach(item => {
    // 计算视差偏移后的X（循环）
    let x = ((item.x - offsetX) % (BASE_W + 200)) - 100;
    if (x < -200) x += BASE_W + 300;

    if (layer === bgLayers[0]) {
      // 远山
      ctx.fillStyle = '#5b8ee6';
      ctx.beginPath();
      ctx.moveTo(x, GROUND_Y);
      ctx.lineTo(x + item.w / 2, GROUND_Y - item.h);
      ctx.lineTo(x + item.w, GROUND_Y);
      ctx.fill();
      // 雪顶
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath();
      ctx.moveTo(x + item.w / 2, GROUND_Y - item.h);
      ctx.lineTo(x + item.w / 2 - 12, GROUND_Y - item.h + 20);
      ctx.lineTo(x + item.w / 2 + 12, GROUND_Y - item.h + 20);
      ctx.fill();
    } else if (layer === bgLayers[1]) {
      // 云朵
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      for (let k = -1; k <= 1; k++) {
        ctx.beginPath();
        ctx.arc(x + k * item.r * 0.8, item.y, item.r * (k === 0 ? 1 : 0.7), 0, Math.PI * 2);
        ctx.fill();
      }
    } else {
      // 近景树
      ctx.fillStyle = '#2d6e2d';
      ctx.fillRect(x + 8, GROUND_Y - item.h, 8, item.h);
      ctx.fillStyle = '#388e3c';
      ctx.beginPath();
      ctx.arc(x + 12, GROUND_Y - item.h - 16, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#4caf50';
      ctx.beginPath();
      ctx.arc(x + 12, GROUND_Y - item.h - 22, 12, 0, Math.PI * 2);
      ctx.fill();
    }
  });
}

// 绘制小鸟（Canvas 绘制，卡通黄色小鸟）
function drawBird() {
  const bx = bird.x + bird.dodgeX;
  const by = bird.y + bird.dodgeY;
  const shake = bird.shakeTimer > 0
    ? Math.sin(bird.shakeTimer * 1.5) * 4
    : 0;

  ctx.save();
  ctx.translate(bx + shake, by);

  // 身体阴影
  ctx.shadowColor = 'rgba(0,0,0,0.25)';
  ctx.shadowBlur  = 8;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 3;

  // 翅膀（后）
  ctx.save();
  ctx.rotate(-bird.wingAngle * 0.5);
  ctx.fillStyle = '#f5a623';
  ctx.beginPath();
  ctx.ellipse(-8, -5, 18, 10, -0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // 身体
  ctx.fillStyle = '#ffe234';
  ctx.beginPath();
  ctx.ellipse(0, 0, 20, 16, 0, 0, Math.PI * 2);
  ctx.fill();

  // 腹部高光
  ctx.fillStyle = '#fff9c4';
  ctx.beginPath();
  ctx.ellipse(2, 3, 10, 8, 0.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;

  // 翅膀（前，扇动）
  ctx.save();
  ctx.rotate(bird.wingAngle);
  ctx.fillStyle = '#f5a623';
  ctx.beginPath();
  ctx.ellipse(4, -6, 14, 8, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // 眼白
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(10, -5, 7, 0, Math.PI * 2);
  ctx.fill();

  // 眼珠
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(12, -5, 4, 0, Math.PI * 2);
  ctx.fill();

  // 眼睛高光
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(14, -7, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // 嘴巴（橙色三角）
  ctx.fillStyle = '#e65100';
  ctx.beginPath();
  ctx.moveTo(18, -3);
  ctx.lineTo(26,  0);
  ctx.lineTo(18,  3);
  ctx.closePath();
  ctx.fill();

  // 脚
  ctx.strokeStyle = '#e65100';
  ctx.lineWidth   = 2.5;
  ctx.lineCap     = 'round';
  ctx.beginPath(); ctx.moveTo(-5, 14); ctx.lineTo(-5, 20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 5, 14); ctx.lineTo( 5, 20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-5, 20); ctx.lineTo(-12,20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 5, 20); ctx.lineTo( 11,20); ctx.stroke();

  ctx.restore();
}

// 绘制障碍物
function drawObstacle(obs) {
  const { type, state: ostatus, x, y, warningTimer } = obs;
  if (ostatus === 'dead') return;

  ctx.save();

  if (ostatus === 'warning') {
    // 警告阶段：显示箭头/感叹号提示
    const alpha = 0.5 + 0.5 * Math.sin(frameCount * 0.2);
    ctx.globalAlpha = alpha;

    ctx.fillStyle = '#ff5555';
    ctx.font = 'bold 26px Arial';
    ctx.textAlign = 'center';

    if (type === 'bottom') {
      ctx.fillText('⚠️', BASE_W - 60, GROUND_Y - 30);
      ctx.fillStyle = '#ff3333';
      ctx.font = 'bold 18px Arial';
      ctx.fillText('↑ 按上躲避!', BASE_W - 60, GROUND_Y - 10);
    } else if (type === 'top') {
      ctx.fillText('⚠️', BASE_W - 60, 90);
      ctx.fillStyle = '#ff3333';
      ctx.font = 'bold 18px Arial';
      ctx.fillText('↓ 按下躲避!', BASE_W - 60, 115);
    } else if (type === 'left') {
      ctx.fillText('⚠️', 60, bird.y + bird.dodgeY);
      ctx.fillStyle = '#ff3333';
      ctx.font = 'bold 18px Arial';
      ctx.fillText('→ 按右闪躲!', 80, bird.y + bird.dodgeY + 25);
    } else if (type === 'right') {
      ctx.fillText('⚠️', BASE_W - 60, bird.y + bird.dodgeY);
      ctx.fillStyle = '#ff3333';
      ctx.font = 'bold 18px Arial';
      ctx.fillText('← 按左闪躲!', BASE_W - 80, bird.y + bird.dodgeY + 25);
    }
    ctx.restore();
    return;
  }

  // active 状态：绘制实体障碍物
  ctx.globalAlpha = 1;

  if (type === 'bottom') {
    // 地面尖刺
    ctx.fillStyle = '#cc2200';
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(x + i * 16, GROUND_Y);
      ctx.lineTo(x + i * 16 + 8, GROUND_Y - 32);
      ctx.lineTo(x + i * 16 + 16, GROUND_Y);
      ctx.closePath();
      ctx.fill();
    }
    ctx.strokeStyle = '#ff5533';
    ctx.lineWidth = 2;
    ctx.stroke();
  } else if (type === 'top') {
    // 上方悬挂石块
    ctx.fillStyle = '#884400';
    ctx.fillRect(x - 18, 0, 36, 50);
    ctx.fillStyle = '#bb6600';
    ctx.beginPath();
    ctx.arc(x, 50, 22, 0, Math.PI * 2);
    ctx.fill();
    // 石头纹理
    ctx.strokeStyle = '#993300';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x - 5, 46, 6, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(x + 8, 54, 4, 0, Math.PI * 2); ctx.stroke();
  } else if (type === 'left' || type === 'right') {
    // 飞来的红星/炸弹
    const spin = frameCount * (type === 'left' ? 0.1 : -0.1);
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(spin);
    ctx.fillStyle = '#ff2244';
    drawStar(ctx, 0, 0, 5, 20, 10);
    ctx.fillStyle = '#ff6688';
    drawStar(ctx, 0, 0, 5, 10, 5);
    ctx.restore();
  }

  // 警告感叹号
  ctx.fillStyle = '#ffee00';
  ctx.font      = 'bold 16px Arial';
  ctx.textAlign = 'center';
  if (type === 'bottom') ctx.fillText('!', x + 24, GROUND_Y - 38);
  else if (type === 'top') ctx.fillText('!', x, 26);

  ctx.restore();
}

// 绘制五角星
function drawStar(ctx, cx, cy, points, outer, inner) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r     = i % 2 === 0 ? outer : inner;
    const angle = (i * Math.PI) / points - Math.PI / 2;
    const px    = cx + r * Math.cos(angle);
    const py    = cy + r * Math.sin(angle);
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
}

// 绘制数学门
function drawMathGate() {
  if (!mathGate) return;
  const { x, y, w, h, state: gs, q } = mathGate;
  if (gs === 'passed') {
    // 消失动画：渐变透明
    return;
  }

  ctx.save();

  // 门框颜色
  const frameColor = gs === 'locked' ? '#cc0000' : '#9c27b0';
  const glowColor  = gs === 'locked' ? '#ff4444' : '#e040fb';

  // 发光效果
  ctx.shadowColor = glowColor;
  ctx.shadowBlur  = 18 + 8 * Math.sin(frameCount * 0.1);

  // 门框
  ctx.strokeStyle = frameColor;
  ctx.lineWidth   = 6;
  ctx.fillStyle   = gs === 'locked'
    ? 'rgba(180,0,0,0.2)'
    : 'rgba(100,0,160,0.18)';
  ctx.beginPath();
  ctx.roundRect(x - w / 2, y, w, h, 10);
  ctx.fill();
  ctx.stroke();

  // 金色装饰线
  ctx.shadowBlur = 0;
  ctx.strokeStyle = gs === 'locked' ? '#ff8888' : 'gold';
  ctx.lineWidth   = 2;
  // 顶部弧形
  ctx.beginPath();
  ctx.arc(x, y + 8, w / 2 - 4, Math.PI, 0);
  ctx.stroke();

  // 题目文字
  ctx.fillStyle = gs === 'locked' ? '#ff4444' : '#fff9c4';
  ctx.font      = 'bold 18px Arial Rounded MT Bold, Arial';
  ctx.textAlign = 'center';
  ctx.shadowColor = gs === 'locked' ? 'red' : 'gold';
  ctx.shadowBlur  = 8;
  ctx.fillText(q.questionText, x, y + 36);

  // 选项提示
  ctx.font      = '13px Arial';
  ctx.fillStyle = '#ddaaff';
  ctx.shadowBlur = 0;
  ctx.fillText('1  2  3  4', x, y + 56);

  ctx.restore();
}

// ---------- 物理/更新 ----------
function update(dt) {
  if (state !== 'playing') return;
  frameCount++;

  // 时间
  elapsedMs = Date.now() - startTime;

  // 小鸟翅膀扇动
  bird.wingAngle = Math.sin(frameCount * 0.18) * 0.5;

  // 震动效果
  if (bird.shakeTimer > 0) bird.shakeTimer--;

  // 卡停恢复
  if (bird.stunTimer > 0) {
    bird.stunTimer--;
    if (bird.stunTimer === 0) {
      // 重新加速
      speed      = 3.5;
      speedMulti = 1;
    }
  }

  // 速度
  const effectiveSpeed = speed * speedMulti;

  // 背景视差滚动
  bgLayers[0].offsetX += effectiveSpeed * 0.3;
  bgLayers[1].offsetX += effectiveSpeed * 0.7;
  bgLayers[2].offsetX += effectiveSpeed * 1.5;

  // 距离
  distance += effectiveSpeed * 0.06; // 换算到 m（约 60fps下 ~m/s）
  if (distance >= TOTAL_DIST) {
    distance = TOTAL_DIST;
    endGame();
    return;
  }

  // ---------- 输入 → 小鸟躲避 ----------
  if (bird.stunTimer === 0) {
    let dodgeDir = '';
    if (keys['ArrowUp']    || keys['w'] || keys['W']) dodgeDir = 'up';
    if (keys['ArrowDown']  || keys['s'] || keys['S']) dodgeDir = 'down';
    if (keys['ArrowRight'] || keys['d'] || keys['D']) dodgeDir = 'right';
    if (keys['ArrowLeft']  || keys['a'] || keys['A']) dodgeDir = 'left';
    if (dodgeTimer > 0) { dodgeDir = lastDodge; dodgeTimer--; }

    const targetDodgeY = dodgeDir === 'up'   ? -80 :
                         dodgeDir === 'down'  ?  80 : 0;
    const targetDodgeX = dodgeDir === 'right' ?  60 :
                         dodgeDir === 'left'  ? -60 : 0;

    bird.dodgeY += (targetDodgeY - bird.dodgeY) * 0.15;
    bird.dodgeX += (targetDodgeX - bird.dodgeX) * 0.15;
  } else {
    // 卡停时回到原位
    bird.dodgeY *= 0.9;
    bird.dodgeX *= 0.9;
  }

  // 限制小鸟不出界
  const birdActualY = bird.y + bird.dodgeY;
  const birdActualX = bird.x + bird.dodgeX;
  if (birdActualY < 30)        bird.dodgeY = 30 - bird.y;
  if (birdActualY > GROUND_Y - 20) bird.dodgeY = GROUND_Y - 20 - bird.y;
  if (birdActualX < 30)        bird.dodgeX = 30 - bird.x;
  if (birdActualX > BASE_W - 60) bird.dodgeX = BASE_W - 60 - bird.x;

  // ---------- 障碍物更新 ----------
  nextObstacleIn--;
  if (nextObstacleIn <= 0) spawnObstacle();

  const bx = bird.x + bird.dodgeX;
  const by = bird.y + bird.dodgeY;

  obstacles.forEach(obs => {
    if (obs.state === 'dead') return;

    // 警告→激活
    if (obs.state === 'warning') {
      obs.warningTimer--;
      if (obs.warningTimer <= 0) obs.state = 'active';
      return;
    }

    // 移动
    if (obs.type === 'bottom' || obs.type === 'top' || obs.type === 'right') {
      obs.x -= effectiveSpeed;
    } else { // left 从左边飞来
      obs.x += effectiveSpeed * 1.2;
    }

    // 出界
    if (obs.x < -80 || obs.x > BASE_W + 80) {
      obs.state = 'dead';
      return;
    }

    // 碰撞检测
    if (bird.stunTimer > 0) return;
    let hit = false;
    if (obs.type === 'bottom') {
      // 地面尖刺：宽48px, 高32px
      hit = bx > obs.x - 24 && bx < obs.x + 48
         && by > GROUND_Y - 40;
    } else if (obs.type === 'top') {
      // 上方石头：arc r=22, 顶部50px
      const dx = bx - obs.x, dy2 = by - 50;
      hit = Math.sqrt(dx * dx + dy2 * dy2) < BIRD_RADIUS + 22;
    } else {
      // 飞行障碍
      const dx = bx - obs.x, dy2 = by - obs.y;
      hit = Math.sqrt(dx * dx + dy2 * dy2) < BIRD_RADIUS + 18;
    }
    if (hit && !obs.hit) {
      obs.hit = true;
      obs.state = 'dead';
      hitObstacle();
    }
  });

  // 清理死亡障碍
  obstacles = obstacles.filter(o => o.state !== 'dead');

  // ---------- 数学门更新 ----------
  nextMathGateIn--;
  if (nextMathGateIn <= 0 && !mathGate) {
    spawnMathGate();
    nextMathGateIn = 400 + Math.floor(Math.random() * 200);
  }

  if (mathGate && mathGate.state !== 'passed') {
    // 门向左移动
    if (mathGate.state !== 'locked') {
      mathGate.x -= effectiveSpeed * 0.8;
    }

    // 判断碰撞
    if (bird.stunTimer === 0) {
      const gateLeft  = mathGate.x - mathGate.w / 2;
      const gateRight = mathGate.x + mathGate.w / 2;
      const gateTop   = mathGate.y;
      const gateBot   = mathGate.y + mathGate.h;

      if (bx > gateLeft && bx < gateRight && by > gateTop && by < gateBot) {
        // 撞门了！
        if (mathGate.state === 'waiting') {
          // 没选就撞上，惩罚
          mathGate.state = 'locked';
          mathPanel.style.display = 'none';
          hitObstacle();
        } else if (mathGate.state === 'locked') {
          // 答错后撞上
          hitObstacle();
        }
      }
    }

    // 门出界
    if (mathGate.x < -60) {
      mathGate = null;
      mathPanel.style.display = 'none';
    }
  }

  // ---------- 更新 HUD ----------
  const pct = (distance / TOTAL_DIST) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('distStat').textContent  = `📍 ${Math.floor(distance)} / ${TOTAL_DIST}m`;
  document.getElementById('timeStat').textContent  = `⏱ ${(elapsedMs / 1000).toFixed(1)}s`;
  const spdLabel = bird.stunTimer > 0 ? '💥 卡停!' : `💨 速度: ${speedMulti.toFixed(1)}x`;
  document.getElementById('speedStat').textContent = spdLabel;
}

// ---------- 主渲染循环 ----------
function draw() {
  ctx.clearRect(0, 0, BASE_W, BASE_H);

  drawSky();
  bgLayers.forEach(drawBgLayer);
  drawGround();

  // 绘制数学门（在障碍物后面）
  drawMathGate();

  // 绘制障碍物
  obstacles.forEach(drawObstacle);

  // 绘制小鸟
  drawBird();

  // 调试信息（可关闭）
  // ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillText(`stunTimer:${bird.stunTimer}`, 10, 20);
}

let lastTime = 0;
function gameLoop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

// ---------- 游戏流程 ----------
function startGame() {
  state       = 'playing';
  startTime   = Date.now();
  elapsedMs   = 0;
  distance    = 0;
  speed       = 3.5;
  speedMulti  = 1;
  frameCount  = 0;

  bird.dodgeY = 0;
  bird.dodgeX = 0;
  bird.shakeTimer = 0;
  bird.stunTimer  = 0;

  obstacles   = [];
  mathGate    = null;
  nextObstacleIn  = 180;
  nextMathGateIn  = 350;

  mathPanel.style.display = 'none';

  document.getElementById('overlay').style.display = 'none';

  // 重置背景偏移
  bgLayers.forEach(l => l.offsetX = 0);
}

function endGame() {
  state = 'finish';
  const t = elapsedMs / 1000;
  saveScore(t);

  const overlay  = document.getElementById('overlay');
  const h1       = overlay.querySelector('h1');
  const p        = overlay.querySelector('p');
  const btn      = document.getElementById('startBtn');

  h1.textContent = '🎉 恭喜完成！';
  p.innerHTML    = `用时 <b style="color:#ffe234;font-size:22px">${t.toFixed(1)}s</b> 跑完了 1000m！`;
  btn.textContent = '再挑战！';
  overlay.style.display = 'flex';

  renderLeaderboard();
  mathPanel.style.display = 'none';
}

// ---------- 排行榜 ----------
function saveScore(t) {
  let scores = JSON.parse(localStorage.getItem('birdRunnerScores') || '[]');
  scores.push(t);
  scores.sort((a, b) => a - b);
  scores = scores.slice(0, 10);
  localStorage.setItem('birdRunnerScores', JSON.stringify(scores));
}

function renderLeaderboard() {
  const scores = JSON.parse(localStorage.getItem('birdRunnerScores') || '[]');
  const list   = document.getElementById('lbList');
  if (scores.length === 0) {
    list.innerHTML = '<li>暂无记录</li>';
    return;
  }
  list.innerHTML = scores
    .map((s, i) => `<li>${['🥇','🥈','🥉'][i] || (i+1)+'.'} ${s.toFixed(1)}s</li>`)
    .join('');
}

// ---------- 启动 ----------
document.getElementById('startBtn').addEventListener('click', startGame);
renderLeaderboard();
requestAnimationFrame(gameLoop);
</script>
